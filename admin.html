<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Admin — Position</title>
  <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css" />
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #111B21;
      --surface: #1F2C34;
      --green: #25D366;
      --green-light: #dcf8c6;
      --green-glow: rgba(37, 211, 102, 0.25);
      --text: #E9EDEF;
      --muted: #8696A0;
      --border: #2A3942;
      --blue-old: #60A5FA;
    }

    html, body { height: 100%; background: var(--bg); color: var(--text); font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif; overflow: hidden; }

    .layout {
      display: grid;
      grid-template-rows: 48px 1fr;
      height: 100vh;
    }

    /* ── HEADER ── */
    header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 0 20px;
      border-bottom: 1px solid var(--border);
      gap: 10px;
      background: var(--surface);
    }

    .header-left {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .header-center {
      display: flex;
      align-items: center;
    }

    .header-right {
      display: flex;
      align-items: center;
      gap: 16px;
    }
    .header-right { margin-left: auto; display: flex; align-items: center; gap: 16px; }
    .poll-badge { font-family: 'Courier New', monospace; font-size: 10px; color: var(--muted); background: var(--border); padding: 3px 10px; border-radius: 20px; }
    #status-text { font-family: 'Courier New', monospace; font-size: 11px; color: var(--green); }

    /* ── VISITORS BUTTON ── */
    #btn-visitors {
      padding: 6px 14px;
      background: rgba(37, 211, 102, 0.1);
      border: 1px solid var(--border);
      color: var(--green);
      border-radius: 20px;
      font-size: 11px;
      font-weight: 500;
      cursor: pointer;
      transition: all 0.2s;
      font-family: 'Inter', sans-serif;
      display: flex;
      align-items: center;
      gap: 6px;
    }
    #btn-visitors:hover {
      background: rgba(37, 211, 102, 0.15);
      border-color: var(--green);
    }

    /* ── RESET BUTTON ── */
    #btn-reset {
      position: fixed;
      bottom: 24px;
      right: 24px;
      z-index: 910;
      padding: 12px 20px;
      background: #ef4444;
      border: none;
      color: #ffffff;
      border-radius: 8px;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      transition: transform 0.2s ease, box-shadow 0.2s ease, background 0.2s ease;
      font-family: 'Inter', sans-serif;
      box-shadow: 0 4px 16px rgba(239, 68, 68, 0.4);
    }

    #btn-reset:hover {
      transform: translateY(-1px);
      background: #dc2626;
    }

    /* ── MAP ── */
    #map-wrap { position: relative; width: 100%; height: 100%; }
    #map { width: 100%; height: 100%; }
    .leaflet-container { background: #090b0a; }

    /* ── VISITORS PANEL ── */
    .visitors-panel {
      position: absolute;
      top: 16px;
      right: 16px;
      bottom: auto;
      left: auto;
      z-index: 900;
      width: 240px;
      max-height: calc(100vh - 96px);
      display: flex;
      flex-direction: column;
      background: rgba(11, 13, 12, 0.95);
      border: 1px solid #1E2320;
      border-radius: 8px;
      overflow: hidden;
      box-shadow: 0 12px 40px rgba(0,0,0,0.25);
    }

    .vp-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 9px 13px;
      gap: 8px;
      cursor: pointer;
      user-select: none;
    }

    .vp-status {
      font-family: 'Courier New', monospace;
      font-size: 9px;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: var(--muted);
    }

    .vp-count {
      color: var(--green);
      font-weight: 700;
      font-size: 12px;
    }

    .vp-toggle {
      color: var(--text);
      font-size: 12px;
      transition: transform 0.2s ease;
    }

    .visitors-panel.closed .vp-list {
      display: none;
    }

    .visitors-panel.closed .vp-toggle {
      transform: rotate(180deg);
    }

    .vp-list {
      max-height: 220px;
      overflow-y: auto;
      border-top: 1px solid #1E2320;
    }

    .vp-item {
      padding: 12px 13px;
      border-bottom: 1px solid #1E2320;
      cursor: pointer;
      transition: background 0.2s;
    }
    .vp-item:hover {
      background: rgba(37, 211, 102, 0.08);
    }
    .vp-item.selected {
      background: rgba(37, 211, 102, 0.14);
      border-left: 2px solid var(--green);
    }

    .vp-top {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 8px;
      margin-bottom: 6px;
      font-size: 12px;
    }

    .vp-name {
      color: var(--text);
      font-weight: 600;
    }

    .vp-time {
      color: var(--muted);
      font-family: 'Courier New', monospace;
      font-size: 11px;
    }

    .vp-bottom {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
      align-items: center;
    }

    .vp-tag {
      padding: 4px 8px;
      border-radius: 999px;
      font-size: 10px;
      color: #E9EDEF;
      background: rgba(255,255,255,0.04);
      border: 1px solid rgba(255,255,255,0.08);
      font-family: 'Courier New', monospace;
    }

    .vp-tag.latest {
      background: rgba(37, 211, 102, 0.12);
      border-color: rgba(37, 211, 102, 0.2);
      color: var(--green);
    }

    .vp-tag.old {
      background: rgba(134, 150, 160, 0.12);
      border-color: rgba(134, 150, 160, 0.2);
      color: var(--muted);
    }

    /* ── INFO CARD ── */
    #info-card {
      position: absolute;
      bottom: 24px;
      left: 24px;
      z-index: 800;
      width: 380px;
      max-width: calc(100vw - 48px);
      background: rgba(11, 13, 12, 0.9);
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      border: 1px solid var(--border);
      border-radius: 8px;
      overflow: hidden;
      transition: opacity .5s ease, transform .5s ease;
    }
    #info-card.hidden {
      opacity: 0;
      transform: translateY(16px);
      pointer-events: none;
    }

    .card-top {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 13px 18px;
      border-bottom: 1px solid var(--border);
    }
    .card-pulse {
      width: 8px; height: 8px; border-radius: 50%;
      background: var(--green);
      box-shadow: 0 0 8px var(--green-glow);
      flex-shrink: 0;
      animation: blink 2s ease-in-out infinite;
    }
    .card-label { font-size: 10px; font-weight: 500; letter-spacing: .16em; text-transform: uppercase; color: var(--text); }
    .card-time { margin-left: auto; font-family: 'Courier New', monospace; font-size: 11px; color: var(--muted); }

    .card-address {
      padding: 14px 18px 12px;
      border-bottom: 1px solid var(--border);
    }
    .addr-eyebrow { font-family: 'Courier New', monospace; font-size: 9px; letter-spacing: .2em; color: var(--muted); text-transform: uppercase; margin-bottom: 6px; }
    .addr-main { font-size: 15px; font-weight: 400; color: var(--text); line-height: 1.35; }
    .addr-sub { font-size: 12px; color: var(--muted); margin-top: 3px; }

    .card-grid {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
    }
    .grid-cell {
      padding: 12px 18px;
      border-right: 1px solid var(--border);
    }
    .grid-cell:last-child { border-right: none; }
    .cell-key { font-family: 'Courier New', monospace; font-size: 9px; letter-spacing: .18em; color: var(--muted); text-transform: uppercase; margin-bottom: 5px; }
    .cell-val { font-family: 'Courier New', monospace; font-size: 12px; color: var(--green); }

    /* ── WAITING ── */
    #waiting {
      position: absolute;
      inset: 0; z-index: 700;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      gap: 14px;
      background: rgba(9, 11, 10, 0.75);
      backdrop-filter: blur(4px);
    }
    #waiting.gone { display: none; }
    .wait-ring {
      width: 38px; height: 38px;
      border: 1px solid var(--border);
      border-top-color: var(--green);
      border-radius: 50%;
      animation: spin 1.4s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    .wait-text { font-family: 'Courier New', monospace; font-size: 11px; color: var(--muted); }

    /* ── LAYER SWITCHER ── */
    #layer-switcher {
      position: absolute;
      left: 16px;
      top: 50%;
      transform: translateY(-50%);
      z-index: 850;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 6px;
    }

    #layer-btn {
      width: 36px;
      height: 36px;
      border-radius: 50%;
      background: rgba(11, 13, 12, 0.92);
      border: 1px solid #1E2320;
      color: var(--text);
      font-size: 16px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: border-color 0.2s, background 0.2s;
      box-shadow: 0 4px 16px rgba(0,0,0,0.3);
    }

    #layer-btn:hover {
      border-color: var(--green);
      background: rgba(37, 211, 102, 0.1);
    }

    #layer-menu {
      display: flex;
      flex-direction: column;
      gap: 4px;
      background: rgba(11, 13, 12, 0.95);
      border: 1px solid #1E2320;
      border-radius: 8px;
      padding: 6px;
      box-shadow: 0 8px 24px rgba(0,0,0,0.4);
    }

    #layer-menu.hidden {
      display: none;
    }

    #layer-menu button {
      padding: 6px 12px;
      background: transparent;
      border: none;
      border-radius: 5px;
      color: var(--muted);
      font-family: 'Courier New', monospace;
      font-size: 10px;
      letter-spacing: 0.1em;
      text-align: left;
      cursor: pointer;
      transition: background 0.15s, color 0.15s;
      white-space: nowrap;
    }

    #layer-menu button:hover {
      background: rgba(37, 211, 102, 0.1);
      color: var(--green);
    }

    #layer-menu button.active {
      color: var(--green);
      background: rgba(37, 211, 102, 0.08);
      border-left: 2px solid var(--green);
      padding-left: 10px;
    }

    @media (max-width: 767px) {
      header {
        padding: 0 10px;
        gap: 6px;
        height: 40px;
      }

      .layout {
        grid-template-rows: 40px 1fr;
      }

      .dot {
        width: 5px;
        height: 5px;
      }

      .header-title {
        font-size: 8px;
        letter-spacing: 0.08em;
      }

      .header-right {
        gap: 8px;
      }

      #btn-visitors {
        padding: 3px 8px;
        font-size: 9px;
        gap: 3px;
        border-radius: 12px;
      }

      #btn-reset {
        padding: 3px 8px;
        font-size: 9px;
      }

      .poll-badge {
        display: none;
      }

      #status-text {
        font-size: 8px;
      }

      .visitors-panel {
        top: 52px;
        right: 12px;
        bottom: auto;
        left: auto;
        width: calc(100vw - 24px);
        max-height: calc(100vh - 64px);
        border-radius: 8px;
      }

      #info-card {
        position: fixed;
        bottom: 0;
        left: 0;
        right: 0;
        width: 100vw;
        max-width: 100vw;
        border-radius: 16px 16px 0 0;
        border-left: none;
        border-right: none;
        border-bottom: none;
      }

      .vp-list {
        max-height: 50vh;
      }

      .card-grid { grid-template-columns: repeat(2, 1fr); }
      .grid-cell:nth-child(2) { border-right: none; }
      .grid-cell:nth-child(3),
      .grid-cell:nth-child(4) { border-top: 1px solid var(--border); border-right: none; }
    }

    /* Mobile layer switcher */
    @media (max-width: 767px) {
      #layer-switcher {
        left: 12px;
        top: 50%;
      }

      #btn-reset {
        bottom: 16px;
        right: 16px;
        padding: 10px 16px;
      }

      #layer-btn {
        width: 32px;
        height: 32px;
        font-size: 14px;
      }
    }
  </style>
</head>
<body>
<div class="layout">

  <header>
    <div class="header-left">
      <div class="dot"></div>
      <span class="header-title">K-Track</span>
    </div>
    <div class="header-right">
      <button id="btn-visitors" onclick="toggleVisitorsDrawer()">
           Visiteurs <span id="header-visitors-count">(0)</span>
        </button>
        <span class="poll-badge">↻ 5s</span>
        <span id="status-text">En attente…</span>
      </div>
    </header>
    <div id="map"></div>

    <button id="btn-reset" onclick="resetAllVisits()">
      ⟳ Réinitialiser
    </button>

    <div id="layer-switcher">
      <button id="layer-btn" onclick="toggleLayerMenu()" title="Changer de calque">
        🗺
      </button>
      <div id="layer-menu" class="hidden">
        <button onclick="switchLayer('Standard')">Standard</button>
        <button onclick="switchLayer('Satellite')">Satellite</button>
        <button onclick="switchLayer('Terrain')">Terrain</button>
        <button onclick="switchLayer('Sombre')">Sombre</button>
        <button onclick="switchLayer('Minimal')">Minimal</button>
      </div>
    </div>

    <div id="visitors-panel" class="visitors-panel">
      <div class="vp-header" onclick="toggleVisitorsPanel()">
        <div>
          <span class="vp-status">VISITEURS</span>
          <span class="vp-count" id="panel-visitors-count">(0)</span>
        </div>
        <div class="vp-toggle" id="vp-toggle">▲</div>
      </div>
      <div class="vp-list" id="visitors-list"></div>
    </div>

    <div id="waiting">
      <div class="wait-ring"></div>
      <p class="wait-text">Chargement des visites…</p>
    </div>

    <div id="info-card" class="hidden">
      <div class="card-top">
        <div class="card-pulse"></div>
        <span class="card-label">Visite détectée</span>
        <span class="card-time" id="card-time">—</span>
      </div>
      <div class="card-address">
        <div class="addr-eyebrow">Adresse</div>
        <div class="addr-main" id="addr-main">Résolution en cours…</div>
        <div class="addr-sub" id="addr-sub"></div>
      </div>
      <div class="card-grid">
        <div class="grid-cell">
          <div class="cell-key">Latitude</div>
          <div class="cell-val" id="val-lat">—</div>
        </div>
        <div class="grid-cell">
          <div class="cell-key">Longitude</div>
          <div class="cell-val" id="val-lng">—</div>
        </div>
        <div class="grid-cell">
          <div class="cell-key">OS</div>
          <div class="cell-val" id="val-os">—</div>
        </div>
        <div class="grid-cell">
          <div class="cell-key">Navigateur</div>
          <div class="cell-val" id="val-browser">—</div>
        </div>
      </div>
    </div>
  </div>

</div>

<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
<script>
  const JSONBIN_BIN_ID  = '69dd06c3856a6821892c67e7';
  const JSONBIN_API_KEY = '$2a$10$.36nNBRUdpE3TtbHXEHEGunOtJSZuVMN9.JO8iefwRLUZ09KoBMIG';

  const map = L.map('map', { zoomControl: false, attributionControl: false }).setView([5.35, -4.0], 6);
  L.control.zoom({ position: 'topleft' }).addTo(map);

  const layers = {
    'Standard': L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png'),
    'Satellite': L.tileLayer('https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}'),
    'Terrain':   L.tileLayer('https://{s}.tile.opentopomap.org/{z}/{x}/{y}.png'),
    'Sombre':    L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png'),
    'Minimal':   L.tileLayer('https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png'),
  };

  let currentLayer = layers['Sombre'];
  currentLayer.addTo(map);
  document.querySelector('.leaflet-tile-pane').style.filter = 'none';

  let visits = [];
  let selectedVisitId = null;
  let markersMap = new Map();
  let trailsMap = new Map();
  let hasInitialData = false;
  let lastKnownLength = 0;
  let panelOpen = window.innerWidth >= 768;

  function isMobile() {
    return window.innerWidth < 768;
  }

  function toggleLayerMenu() {
    const menu = document.getElementById('layer-menu');
    menu.classList.toggle('hidden');
  }

  function switchLayer(name) {
    map.removeLayer(currentLayer);
    currentLayer = layers[name];
    currentLayer.addTo(map);

    const darkLayers = ['Standard', 'Terrain', 'Minimal'];
    const tilePane = document.querySelector('.leaflet-tile-pane');
    if (darkLayers.includes(name)) {
      tilePane.style.filter = 'brightness(0.38) saturate(0.4) hue-rotate(75deg)';
    } else {
      tilePane.style.filter = 'none';
    }

    document.querySelectorAll('#layer-menu button').forEach(btn => {
      btn.classList.toggle('active', btn.textContent === name);
    });

    document.getElementById('layer-menu').classList.add('hidden');
  }

  map.on('click', () => {
    document.getElementById('layer-menu').classList.add('hidden');
  });

  document.addEventListener('DOMContentLoaded', () => {
    const defaultBtn = [...document.querySelectorAll('#layer-menu button')]
      .find(b => b.textContent === 'Sombre');
    if (defaultBtn) defaultBtn.classList.add('active');
  });

  async function resetAllVisits() {
    // Confirmation avant de tout supprimer
    const confirmed = window.confirm(
      '⚠️ Supprimer tous les visiteurs ?\nCette action est irréversible.'
    );
    if (!confirmed) return;

    try {
      // Réécrire le bin avec un tableau vide
      const res = await fetch(`https://api.jsonbin.io/v3/b/${JSONBIN_BIN_ID}`, {
        method: 'PUT',
        headers: {
          'Content-Type': 'application/json',
          'X-Master-Key': JSONBIN_API_KEY
        },
        body: JSON.stringify([])
      });

      if (!res.ok) {
        alert('Erreur lors de la réinitialisation.');
        return;
      }

      // Réinitialiser toute la mémoire locale
      visits = [];
      selectedVisitId = null;
      lastKnownLength = 0;
      hasInitialData = false;

      // Supprimer tous les marqueurs de la carte
      markersMap.forEach(({ marker }) => map.removeLayer(marker));
      markersMap.clear();

      // Supprimer tous les tracés (trails)
      trailsMap.forEach(polyline => map.removeLayer(polyline));
      trailsMap.clear();

      // Vider la liste des visiteurs
      document.getElementById('visitors-list').innerHTML = '';
      document.getElementById('header-visitors-count').textContent = '(0)';
      document.getElementById('panel-visitors-count').textContent = '(0)';
      document.getElementById('status-text').textContent = 'En attente…';

      // Cacher la card info
      document.getElementById('info-card').classList.add('hidden');

      // Réafficher le waiting overlay
      document.getElementById('waiting').classList.remove('gone');

    } catch (err) {
      alert('Erreur réseau lors de la réinitialisation.');
      console.error(err);
    }
  }

  function createMarkerIcon(visit, idx) {
    const isLatest = idx === visits.length - 1;
    const size = isLatest ? 13 : 11;
    const color = isLatest ? '#25D366' : '#60A5FA';
    const labelColor = isLatest ? '#25D366' : '#60A5FA';
    const osLabel = visit.device?.os ? visit.device.os.split(' ')[0] : '—';
    const html = `
      <div style="position:relative;display:flex;flex-direction:column;align-items:center;">
        <div style="width:${size}px;height:${size}px;border-radius:50%;background:${color};border:2px solid #111B21;${isLatest ? 'box-shadow:0 0 12px rgba(37,211,102,0.7);' : ''}"></div>
        <div style="margin-top:4px;padding:2px 5px;font-size:9px;font-family:'Courier New',monospace;color:${labelColor};background:rgba(9,11,10,0.85);border:1px solid #1E2320;border-radius:3px;white-space:nowrap;">#${idx + 1} · ${osLabel}</div>
      </div>
    `;
    return L.divIcon({ html, className: '', iconSize: [80, 40], iconAnchor: [40, 10] });
  }

  async function getAddress(lat, lng) {
    try {
      const res = await fetch(
        `https://nominatim.openstreetmap.org/reverse?lat=${lat}&lon=${lng}&format=json&accept-language=fr`
      );
      const d = await res.json();
      const a = d.address || {};
      const main = a.road || a.suburb || a.neighbourhood || a.quarter || a.village || a.town || a.city || 'Adresse inconnue';
      const sub  = [a.city || a.town || a.village || a.suburb || a.neighbourhood, a.state, a.country].filter(Boolean).join(', ');
      return { main, sub };
    } catch {
      return { main: 'Adresse non disponible', sub: '' };
    }
  }

  function toggleVisitorsPanel() {
    panelOpen = !panelOpen;
    const panel = document.getElementById('visitors-panel');
    if (panelOpen) {
      panel.classList.remove('closed');
    } else {
      panel.classList.add('closed');
    }
    updatePanelVisibility();
  }

  function updatePanelVisibility() {
    const infoCard = document.getElementById('info-card');
    if (isMobile() && panelOpen) {
      infoCard.style.display = 'none';
    } else {
      infoCard.style.display = '';
    }
  }

  function renderVisitorsList() {
    const list = document.getElementById('visitors-list');
    list.innerHTML = '';

    visits.forEach((visit, idx) => {
      const isLatest = idx === visits.length - 1;
      const item = document.createElement('div');
      item.className = 'vp-item';
      if (selectedVisitId === visit.id) {
        item.classList.add('selected');
      }

      const timeStr = formatTime(visit.timestamp);
      const osBrowser = visit.device ? `${visit.device.os} · ${visit.device.browser}` : 'Inconnu';
      const locationLabel = visit.locationLabel || 'Lieu inconnu';

      item.innerHTML = `
        <div class="vp-top">
          <span class="vp-name">#${idx + 1}</span>
          <span class="vp-time">${timeStr}</span>
        </div>
        <div class="vp-bottom">
          <span class="vp-tag ${isLatest ? 'latest' : 'old'}">${osBrowser}</span>
          <span class="vp-tag ${isLatest ? 'latest' : 'old'}">${locationLabel}</span>
        </div>
      `;
      item.onclick = () => selectVisit(visit);
      list.appendChild(item);
    });
  }

  function formatTime(isoString) {
    const d = new Date(isoString);
    return d.toLocaleTimeString('fr-FR', { hour: '2-digit', minute: '2-digit', second: '2-digit' });
  }

  function formatCoords(lat, lng) {
    return `${lat.toFixed(4)}, ${lng.toFixed(4)}`;
  }

  async function resolveLocationLabel(visit) {
    if (visit.locationLabel) {
      return;
    }
    const { main, sub } = await getAddress(visit.lat, visit.lng);
    visit.locationLabel = sub || main || 'Lieu inconnu';
  }

  async function selectVisit(visit) {
    selectedVisitId = visit.id;
    renderVisitorsList();

    map.setView([visit.lat, visit.lng], 16);

    if (markersMap.has(visit.id)) {
      markersMap.get(visit.id).marker.setLatLng([visit.lat, visit.lng]);
    }

    const time = formatTime(visit.timestamp);
    document.getElementById('card-time').textContent = time;
    document.getElementById('val-lat').textContent = visit.lat.toFixed(6);
    document.getElementById('val-lng').textContent = visit.lng.toFixed(6);
    document.getElementById('val-os').textContent = visit.device?.os || '—';
    document.getElementById('val-browser').textContent = visit.device?.browser || '—';

    document.getElementById('addr-main').textContent = 'Résolution…';
    document.getElementById('addr-sub').textContent = '';
    const { main, sub } = await getAddress(visit.lat, visit.lng);
    document.getElementById('addr-main').textContent = main;
    document.getElementById('addr-sub').textContent = sub;

    visit.locationLabel = sub || main || 'Lieu inconnu';
    renderVisitorsList();

    document.getElementById('info-card').classList.remove('hidden');
    updatePanelVisibility();
  }

  function addMarker(visit, idx) {
    if (markersMap.has(visit.id)) return;
    const icon = createMarkerIcon(visit, idx);
    const marker = L.marker([visit.lat, visit.lng], { icon }).addTo(map);
    marker.on('click', () => selectVisit(visit));
    markersMap.set(visit.id, { marker });
  }

  async function fetchVisits() {
    try {
      const res = await fetch(
        `https://api.jsonbin.io/v3/b/${JSONBIN_BIN_ID}/latest`,
        { headers: { 'X-Master-Key': JSONBIN_API_KEY } }
      );
      const json = await res.json();
      const freshVisits = Array.isArray(json.record) ? json.record : [];

      document.getElementById('header-visitors-count').textContent = `(${freshVisits.length})`;
      document.getElementById('panel-visitors-count').textContent = `(${freshVisits.length})`;
      document.getElementById('status-text').textContent = freshVisits.length > 0 ? 'Actif ✓' : 'En attente…';

      if (!hasInitialData && freshVisits.length > 0) {
        document.getElementById('waiting').classList.add('gone');
        hasInitialData = true;
      }

      const updatedVisits = freshVisits;
      updatedVisits.forEach((visit, idx) => {
        if (markersMap.has(visit.id)) {
          const existing = markersMap.get(visit.id);
          const currentLatLng = existing.marker.getLatLng();

          if (currentLatLng.lat !== visit.lat || currentLatLng.lng !== visit.lng) {
            existing.marker.setLatLng([visit.lat, visit.lng]);
          }
        } else {
          addMarker(visit, idx);
        }
      });

      visits = updatedVisits;
      if (visits.length !== lastKnownLength) {
        renderVisitorsList();
      }

      if (!selectedVisitId && visits.length > 0) {
        selectVisit(visits[visits.length - 1]);
      }

      lastKnownLength = visits.length;

      if (isMobile()) {
        panelOpen = false;
        document.getElementById('visitors-panel').classList.add('closed');
      } else {
        panelOpen = true;
        document.getElementById('visitors-panel').classList.remove('closed');
      }
      updatePanelVisibility();
    } catch (err) {
      document.getElementById('status-text').textContent = 'Erreur réseau';
      console.error('Fetch error:', err);
    }
  }

  window.addEventListener('resize', () => {
    if (isMobile() && panelOpen === false) {
      document.getElementById('visitors-panel').classList.add('closed');
    }
    updatePanelVisibility();
  });

  fetchVisits();
  setInterval(fetchVisits, 5000);
</script>
</body>
</html>
