<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Admin — Position</title>
  <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css" />
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@300;400&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0D0F0E;
      --surface: #111413;
      --border: #1E2320;
      --green: #4ADE80;
      --green-dim: rgba(74, 222, 128, 0.1);
      --green-glow: rgba(74, 222, 128, 0.25);
      --text: #CDD8CF;
      --muted: #4E5E52;
      --mono: 'DM Mono', monospace;
    }

    html, body { height: 100%; background: var(--bg); color: var(--text); font-family: 'DM Sans', sans-serif; overflow: hidden; }

    .layout {
      display: grid;
      grid-template-rows: 48px 1fr;
      height: 100vh;
    }

    /* ── HEADER ── */
    header {
      display: flex;
      align-items: center;
      padding: 0 20px;
      border-bottom: 1px solid var(--border);
      gap: 10px;
      background: var(--surface);
    }
    .dot {
      width: 7px; height: 7px; border-radius: 50%;
      background: var(--green);
      box-shadow: 0 0 8px var(--green-glow);
      animation: blink 2.5s ease-in-out infinite;
      flex-shrink: 0;
    }
    @keyframes blink { 0%,100%{opacity:1} 50%{opacity:.2} }
    .header-title { font-size: 11px; font-weight: 500; letter-spacing: .18em; text-transform: uppercase; }
    .header-right { margin-left: auto; display: flex; align-items: center; gap: 16px; }
    .poll-badge { font-family: var(--mono); font-size: 10px; color: var(--muted); background: var(--border); padding: 3px 10px; border-radius: 20px; }
    #status-text { font-family: var(--mono); font-size: 11px; color: var(--green); }

    /* ── MAP ── */
    #map-wrap { position: relative; width: 100%; height: 100%; }
    #map { width: 100%; height: 100%; }
    .leaflet-tile { filter: brightness(0.38) saturate(0.4) hue-rotate(75deg); }
    .leaflet-container { background: #090b0a; }

    /* ── INFO CARD ── */
    #info-card {
      position: absolute;
      bottom: 28px;
      left: 50%;
      transform: translateX(-50%);
      z-index: 900;
      width: min(500px, calc(100vw - 32px));
      background: rgba(11, 13, 12, 0.9);
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      border: 1px solid var(--border);
      border-radius: 6px;
      overflow: hidden;
      transition: opacity .5s ease, transform .5s ease;
    }
    #info-card.hidden {
      opacity: 0;
      transform: translateX(-50%) translateY(16px);
      pointer-events: none;
    }

    .card-top {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 13px 18px;
      border-bottom: 1px solid var(--border);
    }
    .card-pulse {
      width: 8px; height: 8px; border-radius: 50%;
      background: var(--green);
      box-shadow: 0 0 8px var(--green-glow);
      flex-shrink: 0;
      animation: blink 2s ease-in-out infinite;
    }
    .card-label { font-size: 10px; font-weight: 500; letter-spacing: .16em; text-transform: uppercase; color: var(--text); }
    .card-time { margin-left: auto; font-family: var(--mono); font-size: 11px; color: var(--muted); }

    .card-address {
      padding: 14px 18px 12px;
      border-bottom: 1px solid var(--border);
    }
    .addr-eyebrow { font-family: var(--mono); font-size: 9px; letter-spacing: .2em; color: var(--muted); text-transform: uppercase; margin-bottom: 6px; }
    .addr-main { font-size: 15px; font-weight: 400; color: var(--text); line-height: 1.35; }
    .addr-sub { font-size: 12px; color: var(--muted); margin-top: 3px; }

    .card-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
    }
    .grid-cell {
      padding: 12px 18px;
      border-right: 1px solid var(--border);
    }
    .grid-cell:last-child { border-right: none; }
    .cell-key { font-family: var(--mono); font-size: 9px; letter-spacing: .18em; color: var(--muted); text-transform: uppercase; margin-bottom: 5px; }
    .cell-val { font-family: var(--mono); font-size: 12px; color: var(--green); }

    /* ── WAITING ── */
    #waiting {
      position: absolute;
      inset: 0; z-index: 800;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      gap: 14px;
      background: rgba(9, 11, 10, 0.75);
      backdrop-filter: blur(4px);
    }
    #waiting.gone { display: none; }
    .wait-ring {
      width: 38px; height: 38px;
      border: 1px solid var(--border);
      border-top-color: var(--green);
      border-radius: 50%;
      animation: spin 1.4s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    .wait-text { font-family: var(--mono); font-size: 11px; color: var(--muted); }

    /* ── REFRESH BTN ── */
    #btn-refresh {
      position: absolute;
      top: 14px; right: 14px;
      z-index: 900;
      padding: 7px 14px;
      background: rgba(11,13,12,0.88);
      border: 1px solid var(--border);
      color: var(--green);
      font-family: var(--mono);
      font-size: 10px;
      letter-spacing: .12em;
      text-transform: uppercase;
      cursor: pointer;
      border-radius: 4px;
      backdrop-filter: blur(8px);
      transition: background .2s, border-color .2s;
    }
    #btn-refresh:hover { background: var(--green-dim); border-color: rgba(74,222,128,.3); }

    @media (max-width: 480px) {
      .card-grid { grid-template-columns: 1fr 1fr; }
      .grid-cell:nth-child(2) { border-right: none; }
      .grid-cell:nth-child(3) { border-top: 1px solid var(--border); border-right: none; grid-column: 1/-1; }
    }
  </style>
</head>
<body>
<div class="layout">

  <header>
    <div class="dot"></div>
    <span class="header-title">Friend Tracker</span>
    <div class="header-right">
      <span class="poll-badge">↻ 5s</span>
      <span id="status-text">En attente…</span>
    </div>
  </header>

  <div id="map-wrap">
    <div id="map"></div>

    <div id="waiting">
      <div class="wait-ring"></div>
      <p class="wait-text">En attente de la position de ton ami…</p>
    </div>

    <button id="btn-refresh" onclick="fetchPosition()">⟳ Actualiser</button>

    <div id="info-card" class="hidden">
      <div class="card-top">
        <div class="card-pulse"></div>
        <span class="card-label">Position détectée</span>
        <span class="card-time" id="card-time">—</span>
      </div>
      <div class="card-address">
        <div class="addr-eyebrow">Adresse</div>
        <div class="addr-main" id="addr-main">Résolution en cours…</div>
        <div class="addr-sub" id="addr-sub"></div>
      </div>
      <div class="card-grid">
        <div class="grid-cell">
          <div class="cell-key">Latitude</div>
          <div class="cell-val" id="val-lat">—</div>
        </div>
        <div class="grid-cell">
          <div class="cell-key">Longitude</div>
          <div class="cell-val" id="val-lng">—</div>
        </div>
        <div class="grid-cell">
          <div class="cell-key">Statut</div>
          <div class="cell-val" id="val-status">—</div>
        </div>
      </div>
    </div>
  </div>

</div>

<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
<script>
  const JSONBIN_BIN_ID  = '69dd06c3856a6821892c67e7';
  const JSONBIN_API_KEY = '$2a$10$.36nNBRUdpE3TtbHXEHEGunOtJSZuVMN9.JO8iefwRLUZ09KoBMIG';

  const map = L.map('map', { zoomControl: false, attributionControl: false }).setView([5.35, -4.0], 6);
  L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);
  L.control.zoom({ position: 'topleft' }).addTo(map);

  let marker = null, circle = null, hasData = false, lastLat = null, lastLng = null;

  const pinIcon = L.divIcon({
    html: `<div style="position:relative;width:16px;height:16px;">
      <div style="position:absolute;inset:0;background:#4ADE80;border-radius:50%;border:2px solid #0D0F0E;box-shadow:0 0 14px rgba(74,222,128,.7);"></div>
      <div class="ping-ring"></div>
    </div>
    <style>
      .ping-ring{position:absolute;inset:-7px;border:1px solid rgba(74,222,128,.3);border-radius:50%;animation:ping 2.2s ease-out infinite;}
      @keyframes ping{0%{transform:scale(1);opacity:.6}100%{transform:scale(2.8);opacity:0}}
    </style>`,
    className: '',
    iconSize: [16, 16],
    iconAnchor: [8, 8]
  });

  async function getAddress(lat, lng) {
    try {
      const res = await fetch(
        `https://nominatim.openstreetmap.org/reverse?lat=${lat}&lon=${lng}&format=json&accept-language=fr`
      );
      const d = await res.json();
      const a = d.address || {};
      const main = a.road || a.suburb || a.neighbourhood || a.quarter || a.village || a.town || a.city || 'Adresse inconnue';
      const sub  = [a.suburb || a.neighbourhood, a.city || a.town || a.village, a.country].filter(Boolean).join(', ');
      return { main, sub };
    } catch {
      return { main: 'Adresse non disponible', sub: '' };
    }
  }

  async function fetchPosition() {
    document.getElementById('status-text').textContent = '…';
    try {
      const res  = await fetch(`https://api.jsonbin.io/v3/b/${JSONBIN_BIN_ID}/latest`, {
        headers: { 'X-Master-Key': JSONBIN_API_KEY }
      });
      const json = await res.json();
      const data = json.record;

      if (!data?.lat || !data?.lng) {
        document.getElementById('status-text').textContent = 'En attente…';
        return;
      }

      const { lat, lng, timestamp, status } = data;
      document.getElementById('status-text').textContent = 'Actif ✓';

      // Heure
      const heure = timestamp
        ? new Date(timestamp).toLocaleTimeString('fr-FR', { hour: '2-digit', minute: '2-digit', second: '2-digit' })
        : '—';
      document.getElementById('card-time').textContent    = heure;
      document.getElementById('val-lat').textContent      = lat.toFixed(6);
      document.getElementById('val-lng').textContent      = lng.toFixed(6);
      document.getElementById('val-status').textContent   = status === 'friend_arrived' ? '🟢 Arrivé' : (status || '—');

      // Reverse geocoding uniquement si position a changé
      if (lat !== lastLat || lng !== lastLng) {
        lastLat = lat; lastLng = lng;
        document.getElementById('addr-main').textContent = 'Résolution…';
        document.getElementById('addr-sub').textContent  = '';
        const { main, sub } = await getAddress(lat, lng);
        document.getElementById('addr-main').textContent = main;
        document.getElementById('addr-sub').textContent  = sub;
      }

      // Afficher card
      document.getElementById('info-card').classList.remove('hidden');

      // Masquer waiting
      if (!hasData) {
        document.getElementById('waiting').classList.add('gone');
        hasData = true;
      }

      // Carte
      const latlng = [lat, lng];
      map.setView(latlng, 16);
      if (marker) {
        marker.setLatLng(latlng);
        circle.setLatLng(latlng);
      } else {
        marker = L.marker(latlng, { icon: pinIcon }).addTo(map);
        circle = L.circle(latlng, {
          radius: 90, color: '#4ADE80', fillColor: '#4ADE80',
          fillOpacity: 0.06, weight: 1
        }).addTo(map);
      }

    } catch (err) {
      document.getElementById('status-text').textContent = 'Erreur réseau';
      console.error(err);
    }
  }

  fetchPosition();
  setInterval(fetchPosition, 5000);
</script>
</body>
</html>
