<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Admin — Position</title>
  <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css" />
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@300;400&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0D0F0E;
      --surface: #141716;
      --border: #1F2420;
      --green: #4ADE80;
      --green-dim: rgba(74, 222, 128, 0.12);
      --green-glow: rgba(74, 222, 128, 0.3);
      --text: #D4DDD6;
      --muted: #5A6B5E;
      --mono: 'DM Mono', monospace;
    }

    html, body {
      height: 100%;
      background: var(--bg);
      color: var(--text);
      font-family: 'DM Sans', sans-serif;
      overflow: hidden;
    }

    /* Layout */
    .layout {
      display: grid;
      grid-template-columns: 280px 1fr;
      grid-template-rows: 52px 1fr;
      height: 100vh;
    }

    /* Header */
    header {
      grid-column: 1 / -1;
      display: flex;
      align-items: center;
      padding: 0 20px;
      border-bottom: 1px solid var(--border);
      gap: 12px;
    }
    .header-dot {
      width: 8px; height: 8px;
      border-radius: 50%;
      background: var(--green);
      box-shadow: 0 0 8px var(--green-glow);
      animation: blink 2s ease-in-out infinite;
    }
    @keyframes blink {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.3; }
    }
    .header-title {
      font-size: 12px;
      font-weight: 500;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      color: var(--text);
    }
    .header-status {
      margin-left: auto;
      font-family: var(--mono);
      font-size: 11px;
      color: var(--muted);
    }
    #status-text { color: var(--green); }

    /* Sidebar */
    aside {
      border-right: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }
    .panel {
      padding: 20px;
      border-bottom: 1px solid var(--border);
    }
    .panel-label {
      font-family: var(--mono);
      font-size: 10px;
      letter-spacing: 0.2em;
      color: var(--muted);
      text-transform: uppercase;
      margin-bottom: 14px;
    }
    .coord-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 8px 0;
      border-bottom: 1px solid var(--border);
    }
    .coord-row:last-child { border: none; }
    .coord-key {
      font-family: var(--mono);
      font-size: 11px;
      color: var(--muted);
    }
    .coord-val {
      font-family: var(--mono);
      font-size: 12px;
      color: var(--green);
    }

    /* Log */
    .log-area {
      flex: 1;
      overflow-y: auto;
      padding: 16px;
      display: flex;
      flex-direction: column;
      gap: 6px;
    }
    .log-area::-webkit-scrollbar { width: 3px; }
    .log-area::-webkit-scrollbar-thumb { background: var(--border); }

    .log-entry {
      font-family: var(--mono);
      font-size: 11px;
      color: var(--muted);
      line-height: 1.5;
      animation: fadeIn 0.3s ease;
    }
    @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    .log-entry .time { color: var(--green); margin-right: 8px; }
    .log-entry.highlight { color: var(--text); }

    /* Refresh btn */
    .btn-refresh {
      margin: 16px;
      padding: 10px;
      background: var(--green-dim);
      border: 1px solid rgba(74, 222, 128, 0.2);
      color: var(--green);
      font-family: var(--mono);
      font-size: 11px;
      letter-spacing: 0.1em;
      cursor: pointer;
      text-transform: uppercase;
      transition: background 0.2s;
    }
    .btn-refresh:hover { background: rgba(74, 222, 128, 0.2); }

    /* Map */
    #map {
      width: 100%;
      height: 100%;
      background: #0a0c0b;
    }

    /* Leaflet dark override */
    .leaflet-tile { filter: brightness(0.4) saturate(0.5) hue-rotate(80deg); }
    .leaflet-container { background: #0a0c0b; }

    /* No data state */
    #no-data {
      position: absolute;
      inset: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 12px;
      z-index: 500;
      pointer-events: none;
    }
    #no-data p {
      font-family: var(--mono);
      font-size: 12px;
      color: var(--muted);
    }
    #no-data .waiting-ring {
      width: 36px; height: 36px;
      border: 1px solid var(--border);
      border-top-color: var(--green);
      border-radius: 50%;
      animation: spin 1.5s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>

<div class="layout">

  <!-- HEADER -->
  <header>
    <div class="header-dot"></div>
    <span class="header-title">Tracker · Friend</span>
    <span class="header-status">LIVE — polling toutes les 5s &nbsp;|&nbsp; <span id="status-text">En attente…</span></span>
  </header>

  <!-- SIDEBAR -->
  <aside>
    <div class="panel">
      <div class="panel-label">Coordonnées</div>
      <div class="coord-row">
        <span class="coord-key">LAT</span>
        <span class="coord-val" id="val-lat">—</span>
      </div>
      <div class="coord-row">
        <span class="coord-key">LNG</span>
        <span class="coord-val" id="val-lng">—</span>
      </div>
      <div class="coord-row">
        <span class="coord-key">HEURE</span>
        <span class="coord-val" id="val-time">—</span>
      </div>
      <div class="coord-row">
        <span class="coord-key">STATUT</span>
        <span class="coord-val" id="val-status">—</span>
      </div>
    </div>

    <div class="panel">
      <div class="panel-label">Activité</div>
    </div>
    <div class="log-area" id="log"></div>

    <button class="btn-refresh" onclick="fetchPosition()">⟳ Actualiser</button>
  </aside>

  <!-- MAP -->
  <main style="position:relative;">
    <div id="map"></div>
    <div id="no-data">
      <div class="waiting-ring"></div>
      <p>En attente de la position de ton ami…</p>
    </div>
  </main>

</div>

<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
<script>
  // ════════════════════════════════════════
  //  CONFIG — remplace par tes vraies valeurs
  // ════════════════════════════════════════
  const JSONBIN_BIN_ID  = '69dd06c3856a6821892c67e7';
  const JSONBIN_API_KEY = '$2a$10$.36nNBRUdpE3TtbHXEHEGunOtJSZuVMN9.JO8iefwRLUZ09KoBMIG';
  // ════════════════════════════════════════

  // Init carte
  const map = L.map('map', { zoomControl: true }).setView([5.35, -4.0], 6);
  L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
    attribution: '© OpenStreetMap'
  }).addTo(map);

  let marker = null;
  let circle = null;
  let hasData = false;

  // Marqueur custom vert
  const greenIcon = L.divIcon({
    html: `<div style="
      width:14px; height:14px;
      background:var(--green,#4ADE80);
      border-radius:50%;
      border: 2px solid #0D0F0E;
      box-shadow: 0 0 12px rgba(74,222,128,0.6);
    "></div>`,
    className: '',
    iconSize: [14, 14],
    iconAnchor: [7, 7]
  });

  function addLog(msg, highlight = false) {
    const log = document.getElementById('log');
    const now = new Date().toLocaleTimeString('fr-FR', { hour: '2-digit', minute: '2-digit', second: '2-digit' });
    const el = document.createElement('div');
    el.className = 'log-entry' + (highlight ? ' highlight' : '');
    el.innerHTML = `<span class="time">${now}</span>${msg}`;
    log.prepend(el);
    // Garder max 30 entrées
    while (log.children.length > 30) log.removeChild(log.lastChild);
  }

  async function fetchPosition() {
    document.getElementById('status-text').textContent = 'Actualisation…';
    try {
      const res = await fetch(`https://api.jsonbin.io/v3/b/${JSONBIN_BIN_ID}/latest`, {
        headers: { 'X-Master-Key': JSONBIN_API_KEY }
      });
      const json = await res.json();
      const data = json.record;

      if (!data || !data.lat || !data.lng) {
        document.getElementById('status-text').textContent = 'En attente…';
        addLog('Aucune position reçue encore.');
        return;
      }

      const { lat, lng, timestamp, status } = data;
      const latlng = [lat, lng];

      // Mise à jour UI
      document.getElementById('val-lat').textContent = lat.toFixed(6);
      document.getElementById('val-lng').textContent = lng.toFixed(6);
      document.getElementById('val-time').textContent = timestamp
        ? new Date(timestamp).toLocaleTimeString('fr-FR')
        : '—';
      document.getElementById('val-status').textContent = status || '—';
      document.getElementById('status-text').textContent = 'Actif ✓';

      // Cacher le "no data"
      if (!hasData) {
        document.getElementById('no-data').style.display = 'none';
        hasData = true;
        addLog('Première position reçue !', true);
      } else {
        addLog(`Position mise à jour : ${lat.toFixed(4)}, ${lng.toFixed(4)}`);
      }

      // Carte
      map.setView(latlng, 15);
      if (marker) {
        marker.setLatLng(latlng);
        circle.setLatLng(latlng);
      } else {
        marker = L.marker(latlng, { icon: greenIcon })
          .addTo(map)
          .bindPopup('📍 Ton ami est ici')
          .openPopup();
        circle = L.circle(latlng, {
          radius: 80,
          color: '#4ADE80',
          fillColor: '#4ADE80',
          fillOpacity: 0.08,
          weight: 1
        }).addTo(map);
      }

    } catch (err) {
      document.getElementById('status-text').textContent = 'Erreur réseau';
      addLog('Erreur : ' + err.message);
    }
  }

  // Init
  addLog('Dashboard démarré.', true);
  fetchPosition();
  setInterval(fetchPosition, 5000);
</script>
</body>
</html>
