<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Admin — Position</title>
  <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css" />
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #111B21;
      --surface: #1F2C34;
      --green: #25D366;
      --green-light: #dcf8c6;
      --green-glow: rgba(37, 211, 102, 0.25);
      --text: #E9EDEF;
      --muted: #8696A0;
      --border: #2A3942;
      --blue-old: #60A5FA;
    }

    html, body { height: 100%; background: var(--bg); color: var(--text); font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif; overflow: hidden; }

    .layout {
      display: grid;
      grid-template-rows: 48px 1fr;
      height: 100vh;
    }

    /* ── HEADER ── */
    header {
      display: flex;
      align-items: center;
      padding: 0 20px;
      border-bottom: 1px solid var(--border);
      gap: 10px;
      background: var(--surface);
    }
    .dot {
      width: 7px; height: 7px; border-radius: 50%;
      background: var(--green);
      box-shadow: 0 0 8px var(--green-glow);
      animation: blink 2.5s ease-in-out infinite;
      flex-shrink: 0;
    }
    @keyframes blink { 0%,100%{opacity:1} 50%{opacity:.2} }
    .header-title { font-size: 11px; font-weight: 500; letter-spacing: .18em; text-transform: uppercase; }
    .header-right { margin-left: auto; display: flex; align-items: center; gap: 16px; }
    .poll-badge { font-family: 'Courier New', monospace; font-size: 10px; color: var(--muted); background: var(--border); padding: 3px 10px; border-radius: 20px; }
    #status-text { font-family: 'Courier New', monospace; font-size: 11px; color: var(--green); }

    /* ── VISITORS BUTTON ── */
    #btn-visitors {
      padding: 6px 14px;
      background: rgba(37, 211, 102, 0.1);
      border: 1px solid var(--border);
      color: var(--green);
      border-radius: 20px;
      font-size: 11px;
      font-weight: 500;
      cursor: pointer;
      transition: all 0.2s;
      font-family: 'Inter', sans-serif;
      display: flex;
      align-items: center;
      gap: 6px;
    }
    #btn-visitors:hover {
      background: rgba(37, 211, 102, 0.15);
      border-color: var(--green);
    }

    /* ── MAP ── */
    #map-wrap { position: relative; width: 100%; height: 100%; }
    #map { width: 100%; height: 100%; }
    .leaflet-tile { filter: brightness(0.38) saturate(0.4) hue-rotate(75deg); }
    .leaflet-container { background: #090b0a; }

    /* ── VISITORS DRAWER ── */
    #visitors-drawer {
      position: absolute;
      top: 48px;
      left: 0;
      right: 0;
      z-index: 900;
      background: rgba(11, 13, 12, 0.97);
      border-bottom: 1px solid var(--border);
      max-height: 320px;
      overflow-y: auto;
      transform: translateY(-100%);
      transition: transform 0.3s cubic-bezier(0.4, 0, 0.2, 1);
      opacity: 0;
      pointer-events: none;
    }
    #visitors-drawer.open {
      transform: translateY(0);
      opacity: 1;
      pointer-events: auto;
    }

    .visitor-item {
      padding: 12px 20px;
      border-bottom: 1px solid var(--border);
      cursor: pointer;
      transition: background 0.2s;
      display: flex;
      align-items: center;
      gap: 12px;
      font-size: 12px;
      white-space: nowrap;
      overflow: hidden;
    }
    .visitor-item:hover {
      background: rgba(37, 211, 102, 0.05);
    }
    .visitor-item.selected {
      background: rgba(37, 211, 102, 0.15);
    }

    .visitor-dot {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      flex-shrink: 0;
    }
    .visitor-dot.latest {
      background: var(--green);
      box-shadow: 0 0 6px var(--green-glow);
    }
    .visitor-dot.old {
      background: #4E5E52;
    }

    .visitor-name {
      flex: 0 0 auto;
      font-weight: 500;
      color: var(--text);
      min-width: 70px;
    }

    .visitor-device {
      flex: 0 0 auto;
      color: var(--muted);
      font-size: 11px;
    }

    .visitor-time {
      flex: 0 0 auto;
      color: var(--muted);
      font-family: 'Courier New', monospace;
      font-size: 10px;
    }

    .visitor-location {
      flex: 0 0 auto;
      color: var(--muted);
      font-size: 10px;
      font-family: 'Courier New', monospace;
    }

    /* ── INFO CARD ── */
    #info-card {
      position: absolute;
      bottom: 28px;
      left: 50%;
      transform: translateX(-50%);
      z-index: 800;
      width: min(500px, calc(100vw - 32px));
      background: rgba(11, 13, 12, 0.9);
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      border: 1px solid var(--border);
      border-radius: 6px;
      overflow: hidden;
      transition: opacity .5s ease, transform .5s ease;
    }
    #info-card.hidden {
      opacity: 0;
      transform: translateX(-50%) translateY(16px);
      pointer-events: none;
    }

    .card-top {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 13px 18px;
      border-bottom: 1px solid var(--border);
    }
    .card-pulse {
      width: 8px; height: 8px; border-radius: 50%;
      background: var(--green);
      box-shadow: 0 0 8px var(--green-glow);
      flex-shrink: 0;
      animation: blink 2s ease-in-out infinite;
    }
    .card-label { font-size: 10px; font-weight: 500; letter-spacing: .16em; text-transform: uppercase; color: var(--text); }
    .card-time { margin-left: auto; font-family: 'Courier New', monospace; font-size: 11px; color: var(--muted); }

    .card-address {
      padding: 14px 18px 12px;
      border-bottom: 1px solid var(--border);
    }
    .addr-eyebrow { font-family: 'Courier New', monospace; font-size: 9px; letter-spacing: .2em; color: var(--muted); text-transform: uppercase; margin-bottom: 6px; }
    .addr-main { font-size: 15px; font-weight: 400; color: var(--text); line-height: 1.35; }
    .addr-sub { font-size: 12px; color: var(--muted); margin-top: 3px; }

    .card-grid {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
    }
    .grid-cell {
      padding: 12px 18px;
      border-right: 1px solid var(--border);
    }
    .grid-cell:last-child { border-right: none; }
    .cell-key { font-family: 'Courier New', monospace; font-size: 9px; letter-spacing: .18em; color: var(--muted); text-transform: uppercase; margin-bottom: 5px; }
    .cell-val { font-family: 'Courier New', monospace; font-size: 12px; color: var(--green); }

    /* ── WAITING ── */
    #waiting {
      position: absolute;
      inset: 0; z-index: 700;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      gap: 14px;
      background: rgba(9, 11, 10, 0.75);
      backdrop-filter: blur(4px);
    }
    #waiting.gone { display: none; }
    .wait-ring {
      width: 38px; height: 38px;
      border: 1px solid var(--border);
      border-top-color: var(--green);
      border-radius: 50%;
      animation: spin 1.4s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    .wait-text { font-family: 'Courier New', monospace; font-size: 11px; color: var(--muted); }

    @media (max-width: 480px) {
      .card-grid { grid-template-columns: 1fr 1fr; }
      .grid-cell:nth-child(2) { border-right: none; }
      .grid-cell:nth-child(3),
      .grid-cell:nth-child(4) { border-top: 1px solid var(--border); border-right: none; }
      .visitor-item { font-size: 11px; }
      .visitor-device { display: none; }
      .visitor-location { display: none; }
    }
  </style>
</head>
<body>
<div class="layout">

  <header>
    <div class="dot"></div>
    <span class="header-title">Position Tracker</span>
    <div class="header-right">
      <button id="btn-visitors" onclick="toggleVisitorsDrawer()">
        👥 Visiteurs <span id="visitors-count">(0)</span>
      </button>
      <span class="poll-badge">↻ 5s</span>
      <span id="status-text">En attente…</span>
    </div>
  </header>

  <div id="map-wrap">
    <div id="map"></div>

    <div id="visitors-drawer">
      <div id="visitors-list"></div>
    </div>

    <div id="waiting">
      <div class="wait-ring"></div>
      <p class="wait-text">Chargement des visites…</p>
    </div>

    <div id="info-card" class="hidden">
      <div class="card-top">
        <div class="card-pulse"></div>
        <span class="card-label">Visite détectée</span>
        <span class="card-time" id="card-time">—</span>
      </div>
      <div class="card-address">
        <div class="addr-eyebrow">Adresse</div>
        <div class="addr-main" id="addr-main">Résolution en cours…</div>
        <div class="addr-sub" id="addr-sub"></div>
      </div>
      <div class="card-grid">
        <div class="grid-cell">
          <div class="cell-key">Latitude</div>
          <div class="cell-val" id="val-lat">—</div>
        </div>
        <div class="grid-cell">
          <div class="cell-key">Longitude</div>
          <div class="cell-val" id="val-lng">—</div>
        </div>
        <div class="grid-cell">
          <div class="cell-key">OS</div>
          <div class="cell-val" id="val-os">—</div>
        </div>
        <div class="grid-cell">
          <div class="cell-key">Navigateur</div>
          <div class="cell-val" id="val-browser">—</div>
        </div>
      </div>
    </div>
  </div>

</div>

<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
<script>
  const JSONBIN_BIN_ID  = '69dd06c3856a6821892c67e7';
  const JSONBIN_API_KEY = '$2a$10$.36nNBRUdpE3TtbHXEHEGunOtJSZuVMN9.JO8iefwRLUZ09KoBMIG';

  const map = L.map('map', { zoomControl: false, attributionControl: false }).setView([5.35, -4.0], 6);
  L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);
  L.control.zoom({ position: 'topleft' }).addTo(map);

  let visits = [];
  let selectedVisitId = null;
  let markersMap = new Map();
  let hasInitialData = false;
  let lastFetchLength = 0;
  let drawerOpen = false;

  const greenIcon = L.divIcon({
    html: `<div style="position:relative;width:16px;height:16px;">
      <div style="position:absolute;inset:0;background:#25D366;border-radius:50%;border:2px solid #111B21;box-shadow:0 0 14px rgba(37,211,102,.7);"></div>
      <div class="ping-ring"></div>
    </div>
    <style>
      .ping-ring{position:absolute;inset:-7px;border:1px solid rgba(37,211,102,.3);border-radius:50%;animation:ping 2.2s ease-out infinite;}
      @keyframes ping{0%{transform:scale(1);opacity:.6}100%{transform:scale(2.8);opacity:0}}
    </style>`,
    className: '',
    iconSize: [16, 16],
    iconAnchor: [8, 8]
  });

  const blueIcon = L.divIcon({
    html: `<div style="width:12px;height:12px;background:#60A5FA;border-radius:50%;border:2px solid #111B21;box-shadow:0 0 8px rgba(96,165,250,.5);"></div>`,
    className: '',
    iconSize: [12, 12],
    iconAnchor: [6, 6]
  });

  function formatTime(isoString) {
    const d = new Date(isoString);
    return d.toLocaleTimeString('fr-FR', { hour: '2-digit', minute: '2-digit', second: '2-digit' });
  }

  function formatCoords(lat, lng) {
    return `${lat.toFixed(4)}, ${lng.toFixed(4)}`;
  }

  async function getAddress(lat, lng) {
    try {
      const res = await fetch(
        `https://nominatim.openstreetmap.org/reverse?lat=${lat}&lon=${lng}&format=json&accept-language=fr`
      );
      const d = await res.json();
      const a = d.address || {};
      const main = a.road || a.suburb || a.neighbourhood || a.quarter || a.village || a.town || a.city || 'Adresse inconnue';
      const sub  = [a.suburb || a.neighbourhood, a.city || a.town || a.village, a.country].filter(Boolean).join(', ');
      return { main, sub };
    } catch {
      return { main: 'Adresse non disponible', sub: '' };
    }
  }

  function toggleVisitorsDrawer() {
    drawerOpen = !drawerOpen;
    const drawer = document.getElementById('visitors-drawer');
    if (drawerOpen) {
      drawer.classList.add('open');
    } else {
      drawer.classList.remove('open');
    }
  }

  function renderVisitorsList() {
    const list = document.getElementById('visitors-list');
    list.innerHTML = '';

    visits.forEach((visit, idx) => {
      const isLatest = idx === visits.length - 1;
      const li = document.createElement('div');
      li.className = 'visitor-item';
      if (selectedVisitId === visit.id) {
        li.classList.add('selected');
      }

      const dotClass = isLatest ? 'latest' : 'old';
      const deviceStr = visit.device ? `${visit.device.os} · ${visit.device.browser}` : 'Unknown';
      const timeStr = formatTime(visit.timestamp);
      const coordsStr = formatCoords(visit.lat, visit.lng);

      li.innerHTML = `
        <div class="visitor-dot ${dotClass}"></div>
        <div class="visitor-name">Visiteur #${idx + 1}</div>
        <div class="visitor-device">📱 ${deviceStr}</div>
        <div class="visitor-time">🕐 ${timeStr}</div>
        <div class="visitor-location">📍 ${coordsStr}</div>
      `;

      li.onclick = () => selectVisit(visit);
      list.appendChild(li);
    });
  }

  async function selectVisit(visit) {
    selectedVisitId = visit.id;
    renderVisitorsList();

    // Zoom map
    map.setView([visit.lat, visit.lng], 16);

    // Add/update marker
    if (markersMap.has(visit.id)) {
      if (markersMap.get(visit.id).marker) {
        markersMap.get(visit.id).marker.setLatLng([visit.lat, visit.lng]);
      }
    } else {
      const icon = visit.id === visits[visits.length - 1].id ? greenIcon : blueIcon;
      const marker = L.marker([visit.lat, visit.lng], { icon }).addTo(map);
      if (!markersMap.has(visit.id)) {
        markersMap.set(visit.id, {});
      }
      markersMap.get(visit.id).marker = marker;
    }

    // Update info card
    const time = formatTime(visit.timestamp);
    document.getElementById('card-time').textContent = time;
    document.getElementById('val-lat').textContent = visit.lat.toFixed(6);
    document.getElementById('val-lng').textContent = visit.lng.toFixed(6);

    // Device info
    if (visit.device) {
      document.getElementById('val-os').textContent = visit.device.os || '—';
      document.getElementById('val-browser').textContent = visit.device.browser || '—';
    } else {
      document.getElementById('val-os').textContent = '—';
      document.getElementById('val-browser').textContent = '—';
    }

    // Reverse geocoding
    document.getElementById('addr-main').textContent = 'Résolution…';
    document.getElementById('addr-sub').textContent = '';
    const { main, sub } = await getAddress(visit.lat, visit.lng);
    document.getElementById('addr-main').textContent = main;
    document.getElementById('addr-sub').textContent = sub;

    // Show card
    document.getElementById('info-card').classList.remove('hidden');
  }

  async function fetchVisits() {
    try {
      const res = await fetch(
        `https://api.jsonbin.io/v3/b/${JSONBIN_BIN_ID}/latest`,
        { headers: { 'X-Master-Key': JSONBIN_API_KEY } }
      );
      const json = await res.json();
      visits = Array.isArray(json.record) ? json.record : [];

      // Update counter
      document.getElementById('visitors-count').textContent = `(${visits.length})`;
      document.getElementById('status-text').textContent = visits.length > 0 ? 'Actif ✓' : 'En attente…';

      // New visits detected
      if (visits.length !== lastFetchLength && lastFetchLength > 0) {
        // New visit → show latest
        selectVisit(visits[visits.length - 1]);
      }
      lastFetchLength = visits.length;

      // Initial render
      if (!hasInitialData && visits.length > 0) {
        document.getElementById('waiting').classList.add('gone');
        hasInitialData = true;

        // Show all markers
        visits.forEach((visit, idx) => {
          const isLatest = idx === visits.length - 1;
          const icon = isLatest ? greenIcon : blueIcon;
          const marker = L.marker([visit.lat, visit.lng], { icon }).addTo(map);
          markersMap.set(visit.id, { marker });
        });

        // Select latest
        selectVisit(visits[visits.length - 1]);
      }

      // Render visitors list
      renderVisitorsList();
    } catch (err) {
      document.getElementById('status-text').textContent = 'Erreur réseau';
      console.error('Fetch error:', err);
    }
  }

  fetchVisits();
  setInterval(fetchVisits, 5000);
</script>
</body>
</html>
